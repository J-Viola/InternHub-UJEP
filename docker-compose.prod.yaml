services:
  db:
    image: postgres:17
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: .docker/Backend/Dockerfile.prod
    restart: always
    command: sh -c "python manage.py collectstatic --noinput && python manage.py migrate && gunicorn app.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - static_volume:/app/backend/static
      - storage_volume:/app/backend/storage
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/schema/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: .docker/Frontend/Dockerfile.prod
    restart: always
    ports:
      - "80:80"
      # HTTPS (443): Pro produkci přidat SSL termination přes reverse proxy (Traefik/Caddy/Certbot).
      # Příklad s Caddy: nahradit tento service Caddy kontejnerem s automatickým Let's Encrypt.
    volumes:
      - static_volume:/usr/share/nginx/html/static/django
      - storage_volume:/usr/share/nginx/html/storage
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    # ZÁLOHY: Pro produkci zvážit pravidelné pg_dump zálohy (cron + S3/NFS).
    # Příklad: docker exec internhub-db pg_dump -U $PG_USER $PG_DB | gzip > backup.sql.gz
  static_volume:
  storage_volume:
    # ZÁLOHY: Dokumenty (.docx) v storage_volume by měly být zálohovány na S3 nebo NFS.
    # Docker volume není záloha — při odstranění hostu se data ztratí.
