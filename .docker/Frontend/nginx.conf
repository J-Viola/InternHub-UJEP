server {
    listen 80;
    server_name localhost;
    client_max_body_size 20M;  # Allow larger file uploads

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Serve React App
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve Django Static Files (Admin etc.)
    location /static/django/ {
        alias /usr/share/nginx/html/static/django/;
    }

    # Serve Media/Storage Files — protected via auth subrequest
    location /storage/ {
        auth_request /api/auth/check/;
        alias /usr/share/nginx/html/storage/;
    }

    # Internal auth subrequest endpoint — proxy to Django for token verification
    location = /api/auth/check/ {
        internal;
        proxy_pass http://django:8000/api/auth/check/;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
    }
}