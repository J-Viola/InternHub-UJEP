server {
    listen 80;
    server_name localhost;
    client_max_body_size 20M;  # Allow larger file uploads

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Serve React App
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Admin requests to Backend
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve Django Static Files (Admin etc.)
    location /static/django/ {
        alias /usr/share/nginx/html/static/django/;
    }

    # Serve Media/Storage Files
    location /storage/ {
        alias /usr/share/nginx/html/storage/;
    }
}